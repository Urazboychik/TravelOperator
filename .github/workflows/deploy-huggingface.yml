name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set. Create a free Hugging Face account and add a write token."
            exit 1
          fi
          cp huggingface-space-README.md README.md
          python -m pip install --upgrade "huggingface_hub[hf_xet]"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi().upload_folder(
              repo_id="krammyYds/TravelOperator",
              repo_type="space",
              folder_path=".",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "docs/*",
                  "bin/*",
                  "obj/*",
              ],
          )
          PY
