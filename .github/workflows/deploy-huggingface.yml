name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set. Create a free Hugging Face account and add a write token."
            exit 1
          fi
          cp huggingface-space-README.md README.md
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git commit -m "Prepare Hugging Face Space metadata" || true
          git remote add space "https://krammyYds:${HF_TOKEN}@huggingface.co/spaces/krammyYds/TravelOperator" || true
          git push --force space HEAD:main
